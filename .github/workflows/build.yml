name: "This is the build workflow!"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install GCC
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc make

      - name: Build and Test
        run: make test

      - name: Show test summary
        if: always()
        run: |
          echo "=== Test Results ==="
          cat build/test_results.txt 2>/dev/null || echo "No results file found"
          
        